  <rect x="185" y="535" width="280" height="160" rx="24" fill="#111827" stroke="#374151" />
  <text x="220" y="575" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">processed_data.csv</text>
  <text x="220" y="608" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">23</text>
  <text x="280" y="608" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">output columns</text>
  <text x="220" y="645" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Normalized metrics plus days since update</text>

  <rect x="505" y="535" width="280" height="160" rx="24" fill="#111827" stroke="#374151" />
  <text x="540" y="575" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">transformation_log.json</text>
  <text x="540" y="608" fill="#F59E0B" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">5</text>
  <text x="575" y="608" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">anomalies flagged</text>
  <text x="540" y="645" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Imputation and validation trail kept visible</text>

  <rect x="825" y="535" width="280" height="160" rx="24" fill="#111827" stroke="#374151" />
  <text x="860" y="575" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Dashboard tabs</text>
  <text x="860" y="608" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">4</text>
  <text x="900" y="608" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">analytical views</text>
  <text x="860" y="645" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Overview, performance, status, quality</text>

  <rect x="1145" y="535" width="280" height="160" rx="24" fill="#111827" stroke="#374151" />
  <text x="1180" y="575" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Use case</text>
  <text x="1180" y="608" fill="#34D399" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Engineering program control</text>
  <text x="1180" y="645" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">One workflow for blade data, reviews, and QA</text>
</svg>
