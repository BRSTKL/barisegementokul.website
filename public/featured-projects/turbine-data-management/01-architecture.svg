<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="180" y1="90" x2="1460" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="1" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14213D" />
      <stop offset="1" stop-color="#1F365C" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="success" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399" />
      <stop offset="1" stop-color="#10B981" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)" />
  <circle cx="1290" cy="120" r="180" fill="#0EA5E9" fill-opacity="0.12" />
  <circle cx="250" cy="770" r="210" fill="#10B981" fill-opacity="0.1" />

  <text x="110" y="118" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Gas Turbine Blade Data Management System
  </text>
  <text x="110" y="158" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Project structure analyzed from the standalone Python repo
  </text>

  <rect x="110" y="210" width="270" height="130" rx="28" fill="url(#panel)" stroke="#334155" />
  <text x="145" y="258" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">data/generate_data.py</text>
  <text x="145" y="292" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Creates simulated blade records</text>
  <text x="145" y="322" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">200 rows, controlled noise, missing values</text>

  <rect x="450" y="210" width="270" height="130" rx="28" fill="url(#panel)" stroke="#334155" />
  <text x="485" y="258" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">data/raw_blades.csv</text>
  <text x="485" y="292" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Raw engineering dataset</text>
  <text x="485" y="322" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">14 columns before pipeline processing</text>

