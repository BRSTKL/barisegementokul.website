  <text x="825" y="258" fill="#EFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">pipeline/clean_transform.py</text>
  <text x="825" y="292" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Schema check, imputation, anomaly flags</text>
  <text x="825" y="322" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="16">Min-max normalization and audit export</text>

  <rect x="1190" y="210" width="300" height="130" rx="28" fill="url(#success)" />
  <text x="1225" y="258" fill="#ECFDF5" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">app.py</text>
  <text x="1225" y="292" fill="#ECFDF5" font-family="Segoe UI, Arial, sans-serif" font-size="18">Plotly Dash dashboard</text>
  <text x="1225" y="322" fill="#D1FAE5" font-family="Segoe UI, Arial, sans-serif" font-size="16">Fleet, performance, status, quality</text>

  <path d="M380 275H450" stroke="#7DD3FC" stroke-width="6" stroke-linecap="round" />
  <path d="M720 275H790" stroke="#7DD3FC" stroke-width="6" stroke-linecap="round" />
  <path d="M1110 275H1190" stroke="#86EFAC" stroke-width="6" stroke-linecap="round" />
  <path d="M430 275L408 261V289L430 275Z" fill="#7DD3FC" />
  <path d="M760 275L738 261V289L760 275Z" fill="#7DD3FC" />
  <path d="M1160 275L1138 261V289L1160 275Z" fill="#86EFAC" />

